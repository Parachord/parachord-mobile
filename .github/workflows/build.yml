name: Build Release

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

# Mirror desktop's concurrency rule: tagged release builds always run to
# completion; branch pushes cancel in-progress runs.
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Gates the Play Store upload step. Evaluated at job-init time so
      # the `if:` guards on downstream steps are allowed to reference it.
      HAS_PLAY_CREDS: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON != '' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Create local.properties
        run: |
          cat <<EOF > local.properties
          ACHORDION_BEARER_TOKEN=${{ secrets.ACHORDION_BEARER_TOKEN }}
          LASTFM_API_KEY=${{ secrets.LASTFM_API_KEY }}
          LASTFM_SHARED_SECRET=${{ secrets.LASTFM_SHARED_SECRET }}
          SPOTIFY_CLIENT_ID=${{ secrets.SPOTIFY_CLIENT_ID }}
          SOUNDCLOUD_CLIENT_ID=${{ secrets.SOUNDCLOUD_CLIENT_ID }}
          SOUNDCLOUD_CLIENT_SECRET=${{ secrets.SOUNDCLOUD_CLIENT_SECRET }}
          APPLE_MUSIC_DEVELOPER_TOKEN=${{ secrets.APPLE_MUSIC_DEVELOPER_TOKEN }}
          EOF

      - name: Decode CI signing keystore
        run: |
          echo "${{ secrets.CI_KEYSTORE_BASE64 }}" | base64 -d > $RUNNER_TEMP/ci-release.keystore
          echo "CI_KEYSTORE_PATH=$RUNNER_TEMP/ci-release.keystore" >> $GITHUB_ENV
          echo "CI_KEYSTORE_PASSWORD=${{ secrets.CI_KEYSTORE_PASSWORD }}" >> $GITHUB_ENV

      - name: Build release APK and AAB
        run: ./gradlew assembleRelease bundleRelease

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: parachord-release-apk
          path: app/build/outputs/apk/release/*.apk
          retention-days: 14

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: parachord-release-aab
          path: app/build/outputs/bundle/release/*.aab
          retention-days: 14

      # ── Tag-triggered GitHub Release (mirrors desktop's pattern) ────
      # When pushed tag matches v* we publish the signed APK + AAB to a
      # GitHub Release so external testers can download a persistent
      # link instead of juggling 14-day artifact URLs. Branch pushes
      # skip this step.
      - name: Stage release artifacts
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          mkdir -p release-artifacts
          TAG="${GITHUB_REF##refs/tags/}"
          cp app/build/outputs/apk/release/*.apk "release-artifacts/parachord-${TAG}.apk"
          cp app/build/outputs/bundle/release/*.aab "release-artifacts/parachord-${TAG}.aab"
          ls -la release-artifacts

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/*
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Play Store upload (gated on secret presence) ────────────────
      # Triple-T `gradle-play-publisher` uploads the AAB to the Play
      # Console release track. Prerelease tags (v0.4.0-beta.1) route to
      # `internal`; stable tags default to `internal` too and must be
      # promoted through the Play Console UI. Gated on PLAY_SERVICE_
      # ACCOUNT_JSON being present so forks and tag pushes from pre-
      # setup states don't fail this step.
      - name: Write Play service account JSON
        if: startsWith(github.ref, 'refs/tags/v') && env.HAS_PLAY_CREDS == 'true'
        run: |
          printf '%s' '${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}' > "$RUNNER_TEMP/play-service-account.json"
          echo "ANDROID_PUBLISHER_CREDENTIALS=$RUNNER_TEMP/play-service-account.json" >> "$GITHUB_ENV"

      - name: Upload AAB to Play Console
        if: startsWith(github.ref, 'refs/tags/v') && env.HAS_PLAY_CREDS == 'true'
        run: ./gradlew publishBundle --stacktrace
